# =============================================================================
# Basil Capture - SenseCAP Indicator D1 Status Display (ESPHome)
# =============================================================================
# Subscribes to the MQTT topics published by the Basil Capture Pi service and
# shows the current status on the 4" LVGL screen.
#
# Topics (must match pi/config.yaml -> mqtt):
#   basil/capture/status        JSON: {status,title,body,ts}
#   basil/capture/availability  "online" / "offline"  (LWT from the Pi)
#
# Status -> color:  success=green  error=red  scanning=blue  idle=grey
#
# First flash over USB-C (bottom port); afterwards OTA.
# =============================================================================

substitutions:
  name: basil-capture-indicator
  friendly_name: Basil Capture Indicator
  # --- Basil brand palette (matched to the app) ---
  color_bg: "0x5A3A4E"        # deep purple body
  color_bg_dark: "0x3A2130"   # darker header/offline purple
  color_success: "0x6FB06B"   # Basil mint-forward green (readable on dark)
  color_error: "0xC0392B"     # error red
  color_scanning: "0x8E6C88"  # muted purple-lavender for "looking up"
  color_bracket: "0xC9B8C4"   # scanner reticle lavender-grey
  color_text: "0xFFFFFF"      # primary white text
  color_text_dim: "0xC9B8C4"  # secondary lavender-grey text

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2024.6.0
  name_add_mac_suffix: false
  platformio_options:
    board_build.flash_mode: dio

# ESP32-S3 with octal PSRAM. The display will NOT initialize without PSRAM
# configured correctly - this is the usual cause of a black/backlight-off screen.
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESPTOOLPY_FLASHSIZE_8MB: "y"
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO
  hardware_uart: UART0

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Setup"

captive_portal:

# Basil sprig logo (full-color, source is 804x615). RGB565 + alpha_channel
# keeps the PNG's anti-aliased transparency instead of flattening to one
# color, so no image_recolor is applied when it's drawn.
image:
  - file: basil_logo.png
    id: basil_leaf
    resize: 30x23
    type: RGB565
    transparency: alpha_channel

ota:
  - platform: esphome

# --- MQTT: subscribe to the Pi's status topics ------------------------------
# No native HA "api:" block on purpose - the Indicator is driven purely by the
# Pi's MQTT messages, keeping it decoupled from HA internals.
mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password
  birth_message:
    topic: basil/capture/indicator/availability
    payload: online
  will_message:
    topic: basil/capture/indicator/availability
    payload: offline

  on_json_message:
    - topic: basil/capture/status
      then:
        # Update all three values first, THEN redraw once - so the color and
        # text always change together in a single frame.
        - text_sensor.template.publish:
            id: scan_status
            state: !lambda 'return x["status"];'
        - text_sensor.template.publish:
            id: scan_title
            state: !lambda 'return x["title"];'
        - text_sensor.template.publish:
            id: scan_body
            state: !lambda 'return x["body"];'
        - script.execute: refresh_screen

  on_message:
    - topic: basil/capture/availability
      then:
        - lambda: 'id(pi_online) = (x == "online");'
        - script.execute: refresh_screen

globals:
  - id: pi_online
    type: bool
    restore_value: no
    initial_value: "true"

text_sensor:
  - platform: template
    id: scan_status
  - platform: template
    id: scan_title
  - platform: template
    id: scan_body

# --- Display stack ----------------------------------------------------------
i2c:
  - id: bus_a
    sda: GPIO39
    scl: GPIO40
    scan: false

# SPI bus used to send the display's init sequence at boot. Required by the
# mipi_rgb driver even though pixel data runs over the parallel RGB bus.
spi:
  - id: lcd_spi
    clk_pin: GPIO41
    mosi_pin: GPIO48
    miso_pin: GPIO47

pca9554:
  - id: pca9554a_device
    address: 0x20
    pin_count: 16
    i2c_id: bus_a

display:
  - platform: mipi_rgb
    model: SEEED-INDICATOR-D1
    id: sensecap_display
    update_interval: never
    auto_clear_enabled: false

light:
  - platform: monochromatic
    id: backlight
    output: backlight_output
    default_transition_length: 0s
    restore_mode: ALWAYS_ON

output:
  - platform: ledc
    id: backlight_output
    pin:
      number: GPIO45
      ignore_strapping_warning: true
    frequency: 100Hz

# --- LVGL UI ----------------------------------------------------------------
lvgl:
  displays:
    - sensecap_display
  pages:
    - id: main_page
      bg_color: 0x000000
      bg_opa: COVER
      widgets:
        - obj:
            id: bg_panel
            x: 0
            y: 0
            width: 480
            height: 480
            radius: 0
            bg_color: ${color_bg}
            bg_opa: COVER
            border_width: 0
            pad_all: 0
            widgets:
              # --- Header banner (darker purple, Basil + leaf) ---
              - obj:
                  id: header_bar
                  x: 0
                  y: 0
                  width: 480
                  height: 72
                  radius: 0
                  bg_color: ${color_bg_dark}
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
                  widgets:
                    - label:
                        id: lbl_brand
                        text: "Basil"
                        x: 24
                        align: LEFT_MID
                        text_color: ${color_text}
                        text_font: montserrat_28
                    - image:
                        id: img_leaf
                        src: basil_leaf
                        align_to:
                          id: lbl_brand
                          align: OUT_RIGHT_MID
                          x: 4
                          y: -2
              # --- Scanner reticle: four corner brackets (Basil motif) ---
              # Frame ~340w x 200h centered in the body, with "Ready to Scan"
              # sitting inside it. Bar length 60, thickness 8.
              # Frame edges: left x=70, right corner x=410, top y=176, bottom y=376
              # Top-left
              - obj:
                  id: br_tl_h
                  x: 60
                  y: 159
                  width: 64
                  height: 8
                  radius: 0
                  bg_color: ${color_bracket}
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
              - obj:
                  id: br_tl_v
                  x: 60
                  y: 159
                  width: 8
                  height: 64
                  radius: 0
                  bg_color: ${color_bracket}
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
              # Top-right
              - obj:
                  id: br_tr_h
                  x: 356
                  y: 159
                  width: 64
                  height: 8
                  radius: 0
                  bg_color: ${color_bracket}
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
              - obj:
                  id: br_tr_v
                  x: 412
                  y: 159
                  width: 8
                  height: 64
                  radius: 0
                  bg_color: ${color_bracket}
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
              # Bottom-left
              - obj:
                  id: br_bl_h
                  x: 60
                  y: 361
                  width: 64
                  height: 8
                  radius: 0
                  bg_color: ${color_bracket}
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
              - obj:
                  id: br_bl_v
                  x: 60
                  y: 305
                  width: 8
                  height: 64
                  radius: 0
                  bg_color: ${color_bracket}
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
              # Bottom-right
              - obj:
                  id: br_br_h
                  x: 356
                  y: 361
                  width: 64
                  height: 8
                  radius: 0
                  bg_color: ${color_bracket}
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
              - obj:
                  id: br_br_v
                  x: 412
                  y: 305
                  width: 8
                  height: 64
                  radius: 0
                  bg_color: ${color_bracket}
                  bg_opa: COVER
                  border_width: 0
                  pad_all: 0
              # --- Text (centered inside the bracket frame) ---
              # Title + body sit in a flex column instead of fixed y offsets, so
              # the title is always pushed down by however tall the body's
              # wrapped text actually is - no more overlap on long product names.
              - obj:
                  id: status_group
                  align: CENTER
                  y: 24
                  width: 440
                  height: SIZE_CONTENT
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_main: center
                    flex_align_cross: center
                    pad_row: 8
                  widgets:
                    - label:
                        id: lbl_title
                        text: "Ready to Scan"
                        width: 440
                        long_mode: WRAP
                        text_align: CENTER
                        text_color: ${color_text}
                        text_font: montserrat_28
                    - label:
                        id: lbl_body
                        text: ""
                        width: 440
                        long_mode: WRAP
                        text_align: CENTER
                        text_color: ${color_text}
                        text_font: montserrat_28
              - label:
                  id: lbl_footer
                  text: ""
                  align: BOTTOM_MID
                  y: -16
                  width: 440
                  long_mode: WRAP
                  text_align: CENTER
                  text_color: ${color_text_dim}
                  text_font: montserrat_20

# --- Screen refresh logic ---------------------------------------------------
script:
  - id: refresh_screen
    then:
      - lambda: |-
          // Helper: show or hide all eight bracket bars (the scanner reticle).
          auto set_brackets = [](bool visible) {
            lv_obj_t* bars[] = {
              id(br_tl_h), id(br_tl_v), id(br_tr_h), id(br_tr_v),
              id(br_bl_h), id(br_bl_v), id(br_br_h), id(br_br_v)
            };
            for (auto* b : bars) {
              if (visible) lv_obj_clear_flag(b, LV_OBJ_FLAG_HIDDEN);
              else         lv_obj_add_flag(b, LV_OBJ_FLAG_HIDDEN);
            }
          };

          // Pi offline overrides everything.
          if (!id(pi_online)) {
            lv_obj_set_style_bg_color(id(bg_panel), lv_color_hex(${color_bg_dark}), 0);
            set_brackets(false);
            lv_label_set_text(id(lbl_title), "Basil Capture");
            lv_label_set_text(id(lbl_body), "offline");
            lv_obj_clear_flag(id(lbl_body), LV_OBJ_FLAG_HIDDEN);
            lv_label_set_text(id(lbl_footer), "waiting for scanner...");
            return;
          }

          std::string s = id(scan_status).state;
          std::string title = id(scan_title).state;
          std::string body  = id(scan_body).state;

          // Idle = the Basil "Ready to Scan" screen with reticle brackets.
          // lbl_body is hidden rather than just emptied, so the flex column
          // collapses down to the title alone and stays centered in the
          // bracket frame instead of leaving room for an invisible 2nd line.
          if (s == "idle" || s.empty()) {
            lv_obj_set_style_bg_color(id(bg_panel), lv_color_hex(${color_bg}), 0);
            set_brackets(true);
            lv_label_set_text(id(lbl_title), "Ready to Scan");
            lv_label_set_text(id(lbl_body), "");
            lv_obj_add_flag(id(lbl_body), LV_OBJ_FLAG_HIDDEN);
            lv_label_set_text(id(lbl_footer), "");
            return;
          }

          // Active states: hide brackets, fill with the state color, show text.
          uint32_t color = ${color_bg};
          if      (s == "success")  color = ${color_success};
          else if (s == "error")    color = ${color_error};
          else if (s == "scanning") color = ${color_scanning};

          lv_obj_set_style_bg_color(id(bg_panel), lv_color_hex(color), 0);
          set_brackets(false);
          lv_label_set_text(id(lbl_title), title.c_str());
          lv_label_set_text(id(lbl_body),  body.c_str());
          lv_obj_clear_flag(id(lbl_body), LV_OBJ_FLAG_HIDDEN);
          lv_label_set_text(id(lbl_footer), "");
